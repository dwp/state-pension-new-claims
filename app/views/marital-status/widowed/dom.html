{% extends "layouts/main-2.html" %}

{% block content %}


<div class="govuk-width-container">
  <div class="govuk-grid-column-two-thirds">

    <main id="content" role="main">
      <div class="grid-row">
        <div class="column-full">

          {% include './_bar.html' %}

{{ govukBackLink({
      "text": "Back",
      "href": "javascript: window.history.go(-1)"
    })
  }}


  <br>  <br>

        <form method="post">
          <div class="govuk-form-group">
  <fieldset class="govuk-fieldset">
    <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
      <h1 class="govuk-fieldset__heading">
Date of marriage</h1>
    </legend>
    <br>
    <div class="govuk-date-input" id="dom">
        <div class="govuk-date-input__item">
          <div class="govuk-form-group">
            <label class="govuk-label govuk-date-input__label" for="domd">
              Day
            </label>
            <input class="govuk-input govuk-date-input__input govuk-input--width-2" id="domd" name="domd" type="text" inputmode="numeric">
          </div>
        </div>
        <div class="govuk-date-input__item">
          <div class="govuk-form-group">
            <label class="govuk-label govuk-date-input__label" for="domm">
              Month
            </label>
            <input class="govuk-input govuk-date-input__input govuk-input--width-2" id="domm" name="domm" type="text" inputmode="numeric">
          </div>
        </div>
        <div class="govuk-date-input__item">
          <div class="govuk-form-group">
            <label class="govuk-label govuk-date-input__label" for="domy">
              Year
            </label>
            <input class="govuk-input govuk-date-input__input govuk-input--width-4" id="domy" name="domy" type="text" inputmode="numeric">
          </div>
        </div>
      </div>

  </fieldset>
</div>

<div class="govuk-form-group">
  <fieldset class="govuk-fieldset" aria-describedby="dom-hint">
    <legend class="govuk-fieldset__legend govuk-fieldset__legend--m">
      <h1 class="govuk-fieldset__heading">
        Is the date of marriage verified?
      </h1>
    </legend>
    <div class="govuk-radios govuk-radios--inline">
      <div class="govuk-radios__item">
        <input class="govuk-radios__input" id="dom" name="dom" type="radio" value="Verified">
        <label class="govuk-label govuk-radios__label" for="dom">
          Verified
        </label>
      </div>
      <div class="govuk-radios__item">
        <input class="govuk-radios__input" id="dom-2" name="dom" type="radio" value="Unverified">
        <label class="govuk-label govuk-radios__label" for="dom-2">
          Not verified
        </label>
      </div>
    </div>

  </fieldset>
</div>


<button class="govuk-button" data-module="govuk-button">
  Continue
</button>

        </form>




      </div>

    </div>

</div>

</div>

</main>
</div>

<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">

  </div>
</div>

{% endblock %}
