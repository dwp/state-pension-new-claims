{% extends "layouts/main-2.html" %}

{% block content %}


<div class="govuk-width-container">
  <div class="govuk-grid-column-two-thirds">

    <main id="content" role="main">
      <div class="grid-row">
        <div class="column-full">

          {% include './_bar.html' %}

          {{ govukBackLink({
            text: "Back",
            href: "javascript:history.go(-1)"
                            }) }}

          <br><br>
          <h2 class="govuk-heading-l">Is Deborah Rooney's State Pension in payment?</h2>


          <form class="form" method="post">
              <div class="govuk-form-group">
              <div class="govuk-radios--inline">

                <div class="govuk-radios__item">
                    <input class="govuk-radios__input" id="spousesp" name="spousesp" type="radio" value="spinpayment">
                    <label class="govuk-label govuk-radios__label" for="spousesp-2">
                      Yes
                    </label>
                  </div>

                  <div class="govuk-radios__item">
                    <input class="govuk-radios__input" id="spousesp" name="spousesp" type="radio" value="spnotinpayment">
                    <label class="govuk-label govuk-radios__label" for="spousesp-1">
                      No
                    </label>
                  </div>


                </div>

            </div>

            <button type="submit" class="govuk-button" data-module="govuk-button">
              Continue
            </button>
          </form>
        </div>
      </div>
    </main>
</div>
</div>


<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">

  </div>
</div>

{% endblock %}
